<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Password Fast</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2d2d2d;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #a0a0a0;
            word-wrap: break-word;
        }

        .password {
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #181818;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #4CAF50;
            word-break: break-all;
            filter: blur(6px);
            transition: filter 0.3s ease;
            user-select: none;
        }

        .password.unblurred {
            filter: blur(0);
            user-select: text; 
        }

        .password.error {
            filter: blur(0);
            color: #f44336;
            font-size: 1rem;
        }

        .copy-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: bold;
        }

        .copy-btn:hover:not(:disabled) {
            background-color: #005f9e;
        }
        
        .copy-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #999;
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #4CAF50;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #toast.error {
            background-color: #f44336;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title" id="title-display">Đây là pass của apk????</div>
        <div class="password" id="pass-display">xxxxxxxxx</div>
        <button class="copy-btn" id="copy-btn" disabled>Copy Password</button>
    </div>

    <div id="toast">Đã copy!</div>

    <script>
        const passDisplay = document.getElementById('pass-display');
        const titleDisplay = document.getElementById('title-display');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');
        
        let actualPassword = "";

        // Lấy ID từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const pastefyId = urlParams.get('id');

        if (pastefyId) {
            titleDisplay.innerText = "Đang tải dữ liệu...";
            
            // SỬ DỤNG API CHÍNH THỨC CỦA PASTEFY (Nhanh nhất, không lỗi CORS, lấy được paste Không công khai)
            const apiUrl = `https://api.pastefy.app/api/v2/paste/${pastefyId}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Không thể kết nối máy chủ Pastefy");
                    return response.json();
                })
                .then(data => {
                    // Kiểm tra xem paste có tồn tại không
                    if (!data.exists || !data.paste) {
                        throw new Error("Paste không tồn tại hoặc đã bị xóa!");
                    }

                    // Lấy nội dung text từ API
                    const text = data.paste.content;
                    
                    // Tách file thành từng dòng để xử lý
                    const lines = text.split('\n');
                    
                    // Xử lý dòng 1 làm tiêu đề
                    if (lines[0] && lines[0].trim() !== "") {
                        titleDisplay.innerText = `Đây là pass của ${lines[0].trim()}`;
                    }

                    // Tách lấy mật khẩu (Hỗ trợ bắt pass có biểu tượng 👉 hoặc nội dung dòng 2)
                    const match = text.match(/👉\s*(.*)/);
                    if (match) {
                        actualPassword = match[1].trim();
                    } else if (lines.length > 1) {
                        actualPassword = lines[1].trim();
                    } else {
                        actualPassword = text.trim();
                    }

                    // Đưa nội dung thật lên web và MỞ KHÓA nút Copy
                    passDisplay.innerText = actualPassword;
                    copyBtn.disabled = false; 
                    copyBtn.innerText = "Copy Password";
                })
                .catch(err => {
                    // Hiển thị lỗi rõ ràng
                    console.error(err);
                    titleDisplay.innerText = "Lỗi tải dữ liệu!";
                    passDisplay.innerText = "Sai ID hoặc Paste bị khóa riêng tư.";
                    passDisplay.classList.add('error');
                    copyBtn.innerText = "Lỗi";
                });
        }

        // Xử lý sự kiện click nút Copy (Sử dụng cách tương thích cao nhất)
        copyBtn.addEventListener('click', () => {
            if (!actualPassword) return;

            // Tạo một thẻ textarea ẩn để copy (Tránh lỗi trên Iframe/Trình duyệt cũ)
            const textArea = document.createElement("textarea");
            textArea.value = actualPassword;
            // Đặt vị trí ẩn để không làm nhảy trang web
            textArea.style.position = "fixed";
            textArea.style.top = "-9999px";
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();

            try {
                // Thực thi lệnh copy
                const successful = document.execCommand('copy');
                if (successful) {
                    passDisplay.classList.add('unblurred');
                    toast.innerText = "Đã copy thành công!";
                    toast.classList.remove('error');
                    toast.classList.add('show');
                    
                    setTimeout(() => {
                        passDisplay.classList.remove('unblurred');
                        toast.classList.remove('show');
                    }, 2000);
                } else {
                    throw new Error("Trình duyệt từ chối copy");
                }
            } catch (err) {
                // Xử lý lỗi thay vì dùng alert()
                toast.innerText = "Trình duyệt chặn copy!";
                toast.classList.add('error');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
            
            // Xóa thẻ tạm
            document.body.removeChild(textArea);
        });
    </script>
</body>
</html>
