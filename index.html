<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Password Fast</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2d2d2d;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #a0a0a0;
            word-wrap: break-word;
        }

        .password {
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #181818;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #4CAF50;
            word-break: break-all;
            filter: blur(6px);
            transition: filter 0.3s ease;
            user-select: none;
        }

        .password.unblurred {
            filter: blur(0);
            user-select: text; 
        }

        .password.error {
            filter: blur(0);
            color: #f44336;
            font-size: 1rem;
        }

        .copy-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: bold;
        }

        .copy-btn:hover:not(:disabled) {
            background-color: #005f9e;
        }
        
        .copy-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #999;
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #4CAF50;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #toast.error {
            background-color: #f44336;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title" id="title-display">Đây là pass của apk????</div>
        <div class="password" id="pass-display">xxxxxxxxx</div>
        <button class="copy-btn" id="copy-btn" disabled>Copy Password</button>
    </div>

    <div id="toast">Đã copy!</div>

    <script>
        const passDisplay = document.getElementById('pass-display');
        const titleDisplay = document.getElementById('title-display');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');
        
        let actualPassword = "";

        // Lấy ID từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const pastefyId = urlParams.get('id');

        if (pastefyId) {
            titleDisplay.innerText = "Đang tải dữ liệu siêu tốc...";
            
            // TẠO BIẾN THỜI GIAN ĐỂ PHÁ CACHE (CACHE BUSTING)
            // Mỗi lần F5 sẽ sinh ra một chuỗi số mới, buộc proxy phải lấy dữ liệu mới nhất
            const timeStamp = new Date().getTime(); 
            const rawUrl = `https://pastefy.app/${pastefyId}/raw?t=${timeStamp}`;

            // Kỹ thuật tải thông minh: Gọi đồng thời 4 trạm cùng lúc
            async function fetchWithValidation(url, isApi = false) {
                try {
                    // Thêm cache: 'no-store' để cấm trình duyệt lưu cache
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) throw new Error("HTTP Error");
                    
                    if (isApi) {
                        const data = await response.json();
                        if (data && data.paste && data.paste.content) return data.paste.content;
                        throw new Error("API No Content");
                    } else {
                        const text = await response.text();
                        // Chặn trường hợp proxy trả về trang lỗi HTML thay vì text
                        if (!text || text.trim() === "" || text.includes("<html") || text.includes("Cloudflare")) {
                            throw new Error("Invalid Content");
                        }
                        return text;
                    }
                } catch (e) {
                    throw e; // Ném lỗi để Promise.any bỏ qua nguồn này và thử nguồn khác
                }
            }

            const fetchTasks = [
                // Ưu tiên 1: AllOrigins RAW (Thêm tham số _nc để phá cache proxy)
                fetchWithValidation(`https://api.allorigins.win/raw?url=${encodeURIComponent(rawUrl)}&_nc=${timeStamp}`),
                // Ưu tiên 2: CorsProxy
                fetchWithValidation(`https://corsproxy.io/?${encodeURIComponent(rawUrl)}&_nc=${timeStamp}`),
                // Ưu tiên 3: CodeTabs Proxy 
                fetchWithValidation(`https://api.codetabs.com/v1/proxy?quest=${rawUrl}&_nc=${timeStamp}`),
                // Ưu tiên 4: API chính thức 
                fetchWithValidation(`https://api.pastefy.app/api/v2/paste/${pastefyId}?_nc=${timeStamp}`, true)
            ];

            // Chạy đua (Race) 4 nguồn tải cùng lúc để lấy kết quả nhanh nhất
            Promise.any(fetchTasks)
                .then(text => {
                    // Tách file thành từng dòng để xử lý
                    const lines = text.split('\n');
                    
                    // Xử lý dòng 1 làm tiêu đề
                    if (lines[0] && lines[0].trim() !== "") {
                        titleDisplay.innerText = `Đây là pass của ${lines[0].trim()}`;
                    }

                    // Tách lấy mật khẩu (Hỗ trợ bắt pass có biểu tượng 👉 hoặc nội dung dòng 2)
                    const match = text.match(/👉\s*(.*)/);
                    if (match) {
                        actualPassword = match[1].trim();
                    } else if (lines.length > 1) {
                        actualPassword = lines[1].trim();
                    } else {
                        actualPassword = text.trim();
                    }

                    // Đưa nội dung thật lên web và MỞ KHÓA nút Copy
                    passDisplay.innerText = actualPassword;
                    copyBtn.disabled = false; 
                    copyBtn.innerText = "Copy Password";
                })
                .catch(err => {
                    // Chỉ báo lỗi nếu TẤT CẢ các nguồn đều sập/thất bại
                    console.error("Tất cả máy chủ đều không tải được", err);
                    titleDisplay.innerText = "Lỗi tải dữ liệu!";
                    passDisplay.innerText = "Sai ID hoặc Paste đã bị xóa.";
                    passDisplay.classList.add('error');
                    copyBtn.innerText = "Lỗi";
                });
        }

        // Xử lý sự kiện click nút Copy (Sử dụng cách tương thích cao nhất)
        copyBtn.addEventListener('click', () => {
            if (!actualPassword) return;

            // Tạo một thẻ textarea ẩn để copy (Tránh lỗi trên Iframe/Trình duyệt cũ)
            const textArea = document.createElement("textarea");
            textArea.value = actualPassword;
            // Đặt vị trí ẩn để không làm nhảy trang web
            textArea.style.position = "fixed";
            textArea.style.top = "-9999px";
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();

            try {
                // Thực thi lệnh copy
                const successful = document.execCommand('copy');
                if (successful) {
                    passDisplay.classList.add('unblurred');
                    toast.innerText = "Đã copy thành công!";
                    toast.classList.remove('error');
                    toast.classList.add('show');
                    
                    setTimeout(() => {
                        passDisplay.classList.remove('unblurred');
                        toast.classList.remove('show');
                    }, 2000);
                } else {
                    throw new Error("Trình duyệt từ chối copy");
                }
            } catch (err) {
                // Xử lý lỗi thay vì dùng alert()
                toast.innerText = "Trình duyệt chặn copy!";
                toast.classList.add('error');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
            
            // Xóa thẻ tạm
            document.body.removeChild(textArea);
        });
    </script>
</body>
</html>
