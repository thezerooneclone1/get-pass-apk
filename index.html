<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Password</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2d2d2d;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #a0a0a0;
        }

        .password {
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #181818;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #4CAF50;
            word-break: break-all;
            filter: blur(6px);
            transition: filter 0.3s ease;
            user-select: none;
        }

        .password.unblurred {
            filter: blur(0);
            user-select: text; 
        }

        /* Lớp hiển thị khi có lỗi không lấy được ID */
        .password.error {
            filter: blur(0);
            color: #f44336;
            font-size: 1rem;
        }

        .copy-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: bold;
        }

        .copy-btn:hover {
            background-color: #005f9e;
        }
        
        .copy-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #4CAF50;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title" id="title-display">Đây là pass của apk????</div>
        <div class="password" id="pass-display">xxxxxxxxx</div>
        <button class="copy-btn" id="copy-btn" disabled>Copy Password</button>
    </div>

    <div id="toast">Đã copy!</div>

    <script>
        const passDisplay = document.getElementById('pass-display');
        const titleDisplay = document.getElementById('title-display');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');
        
        let actualPassword = "";

        // Lấy ID từ trên thanh địa chỉ (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const pastefyId = urlParams.get('id');

        if (pastefyId) {
            // Lấy dữ liệu từ Pastefy nếu có ID
            fetch(`https://pastefy.app/${pastefyId}/raw`)
                .then(res => {
                    if (!res.ok) throw new Error("Không tìm thấy file");
                    return res.text();
                })
                .then(text => {
                    // Cập nhật tiêu đề (lấy dòng đầu tiên nếu có)
                    const lines = text.split('\n');
                    if (lines[0].trim() !== "") {
                        titleDisplay.innerText = `Đây là pass của ${lines[0].trim()}`;
                    }

                    // Tách lấy pass ở dòng 2 (sau biểu tượng 👉 hoặc nội dung dòng 2)
                    const match = text.match(/👉\s*(.*)/);
                    if (match) {
                        actualPassword = match[1].trim();
                    } else if (lines.length > 1) {
                        actualPassword = lines[1].trim();
                    } else {
                        actualPassword = text.trim();
                    }

                    // Ghi đè chữ "xxxxxxxxx" bằng mật khẩu thật (nhưng vẫn đang bị mờ)
                    passDisplay.innerText = actualPassword;
                    copyBtn.disabled = false; // Mở khóa nút copy
                })
                .catch(err => {
                    titleDisplay.innerText = "Lỗi tải dữ liệu!";
                    passDisplay.innerText = "Không tìm thấy nội dung hoặc ID sai.";
                    passDisplay.classList.add('error');
                });
        } else {
            // Nếu người dùng chỉ vào link trang chủ mà không có ?id=
            // Giữ nguyên giao diện apk???? và xxxxxxxxx, nhưng báo lỗi nút copy
            titleDisplay.innerText = "Lỗi: Thiếu ID của Pastefy!";
            passDisplay.innerText = "Hãy thêm ?id=... vào đường link.";
            passDisplay.classList.add('error');
        }

        // Xử lý sự kiện click nút Copy
        copyBtn.addEventListener('click', () => {
            if (!actualPassword) return;

            navigator.clipboard.writeText(actualPassword).then(() => {
                passDisplay.classList.add('unblurred');
                toast.classList.add('show');
                
                setTimeout(() => {
                    passDisplay.classList.remove('unblurred');
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert('Không thể copy, vui lòng thử lại!');
            });
        });
    </script>
</body>
</html>
